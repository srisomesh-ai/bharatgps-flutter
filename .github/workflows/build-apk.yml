name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Save custom files before regenerating android
        run: |
          mkdir -p /tmp/keep
          cp -r android/app/src/main/res/raw /tmp/keep/raw 2>/dev/null || true
          cp android/app/google-services.json /tmp/keep/google-services.json 2>/dev/null || true

      - name: Remove committed android folder (let Flutter generate a clean one)
        run: rm -rf android

      - name: Regenerate Android scaffolding
        run: flutter create . --platforms=android --org com.bharatgps

      - name: Restore custom files
        run: |
          mkdir -p android/app/src/main/res/raw
          cp -r /tmp/keep/raw/* android/app/src/main/res/raw/ 2>/dev/null || true
          cp /tmp/keep/google-services.json android/app/google-services.json 2>/dev/null || true

      - name: Show generated android gradle files (debug)
        run: |
          echo "---- android/app ----"; ls -la android/app | grep -i gradle || true
          echo "---- android ----"; ls -la android | grep -i gradle || true

      - name: Clean res/raw (keep only valid sound resources)
        run: |
          if [ -d android/app/src/main/res/raw ]; then
            cd android/app/src/main/res/raw
            for f in *; do
              [ -e "$f" ] || continue
              # keep only lowercase a-z, 0-9, underscore filenames with audio extensions
              if echo "$f" | grep -Eq '^[a-z0-9_]+\.(mp3|ogg|wav)$'; then
                echo "keep $f"
              else
                echo "removing invalid raw resource: $f"
                rm -f "$f"
              fi
            done
            cd - >/dev/null
          fi

      - name: Copy sounds to assets (for in-app preview playback)
        run: |
          mkdir -p assets/sounds
          if [ -d android/app/src/main/res/raw ]; then
            for f in android/app/src/main/res/raw/*.mp3 android/app/src/main/res/raw/*.wav android/app/src/main/res/raw/*.ogg; do
              [ -e "$f" ] || continue
              cp "$f" assets/sounds/
            done
          fi
          echo "assets/sounds now contains:"
          ls -1 assets/sounds/ 2>/dev/null || echo "(none)"

      - name: Patch manifest (name, internet, cleartext, notif permission)
        run: |
          python3 - <<'PY'
          import re
          p='android/app/src/main/AndroidManifest.xml'
          s=open(p).read()
          if 'android.permission.INTERNET' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.INTERNET"/>', s, count=1)
          if 'POST_NOTIFICATIONS' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>', s, count=1)
          if 'android.permission.VIBRATE' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.VIBRATE"/>', s, count=1)
          if 'ACCESS_FINE_LOCATION' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>', s, count=1)
          if 'USE_BIOMETRIC' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>\n    <uses-permission android:name="android.permission.USE_FINGERPRINT"/>', s, count=1)
          # allow launching maps/geo intents + WhatsApp (Android 11+ visibility)
          if '<queries>' not in s:
              q='<queries><intent><action android:name="android.intent.action.VIEW"/><data android:scheme="geo"/></intent><intent><action android:name="android.intent.action.VIEW"/><data android:scheme="https"/></intent><intent><action android:name="android.intent.action.VIEW"/><data android:scheme="market"/></intent><intent><action android:name="android.intent.action.VIEW"/><data android:scheme="upi"/></intent><intent><action android:name="android.intent.action.SENDTO"/><data android:scheme="mailto"/></intent><intent><action android:name="android.intent.action.DIAL"/></intent><package android:name="com.whatsapp"/><package android:name="com.whatsapp.w4b"/></queries>'
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    '+q, s, count=1)
          s=re.sub(r'android:label="[^"]*"', 'android:label="Bharat GPS Tracker"', s, count=1)
          if 'usesCleartextTraffic' not in s:
              s=re.sub(r'(<application)', r'\1 android:usesCleartextTraffic="true"', s, count=1)
          open(p,'w').write(s)
          print('manifest patched')
          PY

      - name: Patch MainActivity for local_auth (FlutterFragmentActivity)
        run: |
          python3 - <<'PY'
          import glob, os
          # local_auth requires the host Activity to be a FlutterFragmentActivity
          for ext in ('kt','java'):
              for f in glob.glob(f'android/app/src/main/kotlin/**/MainActivity.{ext}', recursive=True) + \
                       glob.glob(f'android/app/src/main/java/**/MainActivity.{ext}', recursive=True):
                  s=open(f).read()
                  if 'FlutterFragmentActivity' in s:
                      print('already patched', f); continue
                  s=s.replace('import io.flutter.embedding.android.FlutterActivity',
                              'import io.flutter.embedding.android.FlutterFragmentActivity')
                  s=s.replace('FlutterActivity', 'FlutterFragmentActivity')
                  open(f,'w').write(s)
                  print('patched', f)
          PY


          python3 - <<'PY'
          import os, re

          groovy='android/app/build.gradle'
          kts='android/app/build.gradle.kts'

          if os.path.exists(groovy):
              p=groovy; kotlin=False
          elif os.path.exists(kts):
              p=kts; kotlin=True
          else:
              raise SystemExit('No app build.gradle(.kts) found')

          s=open(p).read()
          print('Patching', p, '(kts)' if kotlin else '(groovy)')

          if kotlin:
              # compileOptions { isCoreLibraryDesugaringEnabled = true }
              if 'isCoreLibraryDesugaringEnabled' not in s:
                  if re.search(r'compileOptions\s*\{', s):
                      s=re.sub(r'(compileOptions\s*\{)', r'\1\n        isCoreLibraryDesugaringEnabled = true', s, count=1)
                  else:
                      s=re.sub(r'(android\s*\{)', r'\1\n    compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n    }', s, count=1)
              # dependencies { coreLibraryDesugaring("...") }
              if 'desugar_jdk_libs' not in s:
                  if re.search(r'dependencies\s*\{', s):
                      s=re.sub(r'(dependencies\s*\{)', r'\1\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")', s, count=1)
                  else:
                      s=s.rstrip()+'\n\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")\n}\n'
              # minSdk = 23
              s=re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 23', s)
              s=re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 23', s)
          else:
              if 'coreLibraryDesugaringEnabled' not in s:
                  if re.search(r'compileOptions\s*\{', s):
                      s=re.sub(r'(compileOptions\s*\{)', r'\1\n        coreLibraryDesugaringEnabled true', s, count=1)
                  else:
                      s=re.sub(r'(android\s*\{)', r'\1\n    compileOptions {\n        coreLibraryDesugaringEnabled true\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }', s, count=1)
              if 'desugar_jdk_libs' not in s:
                  if re.search(r'dependencies\s*\{', s):
                      s=re.sub(r'(dependencies\s*\{)', r'\1\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"', s, count=1)
                  else:
                      s=s.rstrip()+'\n\ndependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"\n}\n'
              s=re.sub(r'minSdk(Version)?\s+flutter\.minSdkVersion', 'minSdk 23', s)
              s=re.sub(r'minSdk(Version)?\s+\d+', 'minSdk 23', s)

          open(p,'w').write(s)
          print('desugaring + minSdk patched')
          PY

      - name: Enable Firebase (google-services) only if config present
        run: |
          if [ -f android/app/google-services.json ]; then
            echo "google-services.json found — enabling Firebase plugin"
            python3 - <<'PY'
          import os, re
          # app build file
          groovy='android/app/build.gradle'; kts='android/app/build.gradle.kts'
          if os.path.exists(groovy): p=groovy; kotlin=False
          else: p=kts; kotlin=True
          s=open(p).read()
          if 'com.google.gms.google-services' not in s:
              if kotlin:
                  s=re.sub(r'(plugins\s*\{)', r'\1\n    id("com.google.gms.google-services")', s, count=1)
              else:
                  s=re.sub(r'(plugins\s*\{)', r'\1\n    id "com.google.gms.google-services"', s, count=1)
          open(p,'w').write(s)
          # settings file
          sg='android/settings.gradle'; sk='android/settings.gradle.kts'
          if os.path.exists(sg): sp=sg; skotlin=False
          else: sp=sk; skotlin=True
          s2=open(sp).read()
          if 'com.google.gms.google-services' not in s2:
              if skotlin:
                  s2=re.sub(r'(plugins\s*\{)', r'\1\n    id("com.google.gms.google-services") version "4.4.1" apply false', s2, count=1)
              else:
                  s2=re.sub(r'(plugins\s*\{)', r'\1\n    id "com.google.gms.google-services" version "4.4.1" apply false', s2, count=1)
          open(sp,'w').write(s2)
          print('Firebase plugin enabled')
          PY
          else
            echo "No google-services.json — building without Firebase (notifications inactive)."
          fi

      - name: Generate app launcher icons (BharatGPS logo)
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons || dart run flutter_launcher_icons || true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify geolocator resolved
        run: |
          if flutter pub deps 2>/dev/null | grep -q geolocator; then
            echo "✓ geolocator resolved OK"
          else
            echo "✗ geolocator NOT resolved — running pub get again with verbose"
            flutter pub get -v 2>&1 | tail -40
          fi

      - name: Patch plugin gradle files (remove dead jcenter repo)
        run: |
          # Some plugins (e.g. older speech_to_text) still reference jcenter(),
          # which is shut down and breaks the build. Strip it from any plugin.
          find ~/.pub-cache -name "build.gradle" -path "*android*" -exec sed -i '/jcenter()/d' {} + 2>/dev/null || true
          echo "patched plugin gradle files"

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bharatgps-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
