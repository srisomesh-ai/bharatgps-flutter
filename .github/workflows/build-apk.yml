name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Remove committed android folder (let Flutter generate a clean one)
        run: rm -rf android

      - name: Regenerate Android scaffolding (correct gradle for this Flutter)
        run: flutter create . --platforms=android --org com.bharatgps

      - name: Apply app name + internet permission + cleartext
        run: |
          python3 - <<'PY'
          import re
          p='android/app/src/main/AndroidManifest.xml'
          s=open(p).read()
          if 'android.permission.INTERNET' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.INTERNET"/>', s, count=1)
          s=re.sub(r'android:label="[^"]*"', 'android:label="Bharat GPS Tracker"', s, count=1)
          if 'usesCleartextTraffic' not in s:
              s=re.sub(r'(<application)', r'\1 android:usesCleartextTraffic="true"', s, count=1)
          open(p,'w').write(s)
          print('manifest patched OK')
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bharatgps-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
