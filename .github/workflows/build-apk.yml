name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Save custom files before regenerating android
        run: |
          mkdir -p /tmp/keep
          cp -r android/app/src/main/res/raw /tmp/keep/raw 2>/dev/null || true
          cp android/app/google-services.json /tmp/keep/google-services.json 2>/dev/null || true

      - name: Remove committed android folder (let Flutter generate a clean one)
        run: rm -rf android

      - name: Regenerate Android scaffolding
        run: flutter create . --platforms=android --org com.bharatgps

      - name: Restore custom files
        run: |
          mkdir -p android/app/src/main/res/raw
          cp -r /tmp/keep/raw/* android/app/src/main/res/raw/ 2>/dev/null || true
          cp /tmp/keep/google-services.json android/app/google-services.json 2>/dev/null || true

      - name: Show generated android gradle files (debug)
        run: |
          echo "---- android/app ----"; ls -la android/app | grep -i gradle || true
          echo "---- android ----"; ls -la android | grep -i gradle || true

      - name: Clean res/raw (keep only valid sound resources)
        run: |
          if [ -d android/app/src/main/res/raw ]; then
            cd android/app/src/main/res/raw
            for f in *; do
              [ -e "$f" ] || continue
              # keep only lowercase a-z, 0-9, underscore filenames with audio extensions
              if echo "$f" | grep -Eq '^[a-z0-9_]+\.(mp3|ogg|wav)$'; then
                echo "keep $f"
              else
                echo "removing invalid raw resource: $f"
                rm -f "$f"
              fi
            done
            cd - >/dev/null
          fi

      - name: Patch manifest (name, internet, cleartext, notif permission)
        run: |
          python3 - <<'PY'
          import re
          p='android/app/src/main/AndroidManifest.xml'
          s=open(p).read()
          if 'android.permission.INTERNET' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.INTERNET"/>', s, count=1)
          if 'POST_NOTIFICATIONS' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>', s, count=1)
          s=re.sub(r'android:label="[^"]*"', 'android:label="Bharat GPS Tracker"', s, count=1)
          if 'usesCleartextTraffic' not in s:
              s=re.sub(r'(<application)', r'\1 android:usesCleartextTraffic="true"', s, count=1)
          open(p,'w').write(s)
          print('manifest patched')
          PY

      - name: Enable desugaring + minSdk (handles .gradle and .gradle.kts)
        run: |
          python3 - <<'PY'
          import os, re

          groovy='android/app/build.gradle'
          kts='android/app/build.gradle.kts'

          if os.path.exists(groovy):
              p=groovy; kotlin=False
          elif os.path.exists(kts):
              p=kts; kotlin=True
          else:
              raise SystemExit('No app build.gradle(.kts) found')

          s=open(p).read()
          print('Patching', p, '(kts)' if kotlin else '(groovy)')

          if kotlin:
              # compileOptions { isCoreLibraryDesugaringEnabled = true }
              if 'isCoreLibraryDesugaringEnabled' not in s:
                  if re.search(r'compileOptions\s*\{', s):
                      s=re.sub(r'(compileOptions\s*\{)', r'\1\n        isCoreLibraryDesugaringEnabled = true', s, count=1)
                  else:
                      s=re.sub(r'(android\s*\{)', r'\1\n    compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n    }', s, count=1)
              # dependencies { coreLibraryDesugaring("...") }
              if 'desugar_jdk_libs' not in s:
                  if re.search(r'dependencies\s*\{', s):
                      s=re.sub(r'(dependencies\s*\{)', r'\1\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")', s, count=1)
                  else:
                      s=s.rstrip()+'\n\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")\n}\n'
              # minSdk = 21
              s=re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 21', s)
              s=re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 21', s)
          else:
              if 'coreLibraryDesugaringEnabled' not in s:
                  if re.search(r'compileOptions\s*\{', s):
                      s=re.sub(r'(compileOptions\s*\{)', r'\1\n        coreLibraryDesugaringEnabled true', s, count=1)
                  else:
                      s=re.sub(r'(android\s*\{)', r'\1\n    compileOptions {\n        coreLibraryDesugaringEnabled true\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }', s, count=1)
              if 'desugar_jdk_libs' not in s:
                  if re.search(r'dependencies\s*\{', s):
                      s=re.sub(r'(dependencies\s*\{)', r'\1\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"', s, count=1)
                  else:
                      s=s.rstrip()+'\n\ndependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"\n}\n'
              s=re.sub(r'minSdk(Version)?\s+flutter\.minSdkVersion', 'minSdk 21', s)
              s=re.sub(r'minSdk(Version)?\s+\d+', 'minSdk 21', s)

          open(p,'w').write(s)
          print('desugaring + minSdk patched')
          PY

      - name: Enable Firebase (google-services) only if config present
        run: |
          if [ -f android/app/google-services.json ]; then
            echo "google-services.json found — enabling Firebase plugin"
            python3 - <<'PY'
          import os, re
          # app build file
          groovy='android/app/build.gradle'; kts='android/app/build.gradle.kts'
          if os.path.exists(groovy): p=groovy; kotlin=False
          else: p=kts; kotlin=True
          s=open(p).read()
          if 'com.google.gms.google-services' not in s:
              if kotlin:
                  s=re.sub(r'(plugins\s*\{)', r'\1\n    id("com.google.gms.google-services")', s, count=1)
              else:
                  s=re.sub(r'(plugins\s*\{)', r'\1\n    id "com.google.gms.google-services"', s, count=1)
          open(p,'w').write(s)
          # settings file
          sg='android/settings.gradle'; sk='android/settings.gradle.kts'
          if os.path.exists(sg): sp=sg; skotlin=False
          else: sp=sk; skotlin=True
          s2=open(sp).read()
          if 'com.google.gms.google-services' not in s2:
              if skotlin:
                  s2=re.sub(r'(plugins\s*\{)', r'\1\n    id("com.google.gms.google-services") version "4.4.1" apply false', s2, count=1)
              else:
                  s2=re.sub(r'(plugins\s*\{)', r'\1\n    id "com.google.gms.google-services" version "4.4.1" apply false', s2, count=1)
          open(sp,'w').write(s2)
          print('Firebase plugin enabled')
          PY
          else
            echo "No google-services.json — building without Firebase (notifications inactive)."
          fi

      - name: Generate app launcher icons (BharatGPS logo)
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons || dart run flutter_launcher_icons || true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bharatgps-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
